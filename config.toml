[theme]
base = "light"
primaryColor = "#D9534F"
font = "sans serif"

[theme.light]
backgroundColor = "#F9F6F0"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1A1D20"

[theme.light.sidebar]
backgroundColor = "#FFFFFF"

[theme.dark]
backgroundColor = "#15171A"
secondaryBackgroundColor = "#1F2225"
textColor = "#EDE8DC"

[theme.dark.sidebar]
backgroundColor = "#1F2225"

[server]
headless = true
port = 8501
address = "0.0.0.0"
enableXsrfProtection = true
